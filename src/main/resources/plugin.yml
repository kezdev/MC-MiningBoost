name: MiningBoost
version: '${version}'
main: dev.kezhall.miningboost.MiningBoost
description: Speeds up mining with configurable per-tool boosts.
author: Kez
website: https://github.com/kezdev
api-version: '26.1.2'
commands:
  miningboost:
    description: Show mining boost status, or reload the config.
    usage: /miningboost [reload]
permissions:
  miningboost.reload:
    description: Allows reloading the MiningBoost config.
    default: op
